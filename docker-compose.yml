version: '3.8'

services:
  pokebox:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-yourusername}/pokebox:latest
    container_name: pokebox
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - TZ=UTC
    networks:
      - default
      - monitoring

networks:
  monitoring:
    external: true
