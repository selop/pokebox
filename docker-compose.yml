version: '3.8'

services:
  pokebox:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-yourusername}/pokebox:latest
    container_name: pokebox
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    volumes:
      - /mnt/HC_Volume_102273859/pokebox-assets:/data/assets:ro
    read_only: true
    tmpfs:
      - /var/run
      - /var/cache/nginx
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default
      - monitoring

networks:
  monitoring:
    external: true
