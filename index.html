<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta
      name="description"
      content="Virtual Pokémon card box with holographic effects and face tracking"
    />
    <link rel="canonical" href="https://pokebox.lopatkin.net/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pokebox" />
    <meta
      property="og:title"
      content="Pokebox — Head-Tracked Holographic Pokemon Card Viewer"
    />
    <meta
      property="og:description"
      content="A 3D Pokemon card viewer with real-time face tracking, holographic GLSL shaders, and off-axis perspective projection."
    />
    <meta property="og:url" content="https://pokebox.lopatkin.net/" />
    <meta
      property="og:image"
      content="https://pokebox.lopatkin.net/web-app-manifest-512x512.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Pokebox — Head-Tracked Holographic Pokemon Card Viewer"
    />
    <meta
      name="twitter:description"
      content="A 3D Pokemon card viewer with real-time face tracking, holographic GLSL shaders, and off-axis perspective projection."
    />
    <meta
      name="twitter:image"
      content="https://pokebox.lopatkin.net/web-app-manifest-512x512.png"
    />

    <!-- Self-hosted fonts (latin only) -->
    <style>
      @font-face {
        font-family: 'Space Mono';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/space-mono-400-latin.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Space Mono';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/space-mono-700-latin.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Syne';
        font-style: normal;
        font-weight: 400 800;
        font-display: swap;
        src: url('/fonts/syne-latin.woff2') format('woff2');
      }
    </style>
    <title>Pokebox - Head Tracked Holo Effects!</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
